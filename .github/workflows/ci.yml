name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: pip install -e ".[dev]"
      - run: mypy src/reverse_tool/

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -m unit -v --cov=reverse_tool --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
        continue-on-error: true

  build-docker:
    runs-on: ubuntu-latest
    needs: unit-test
    strategy:
      matrix:
        target: [full, ghidra-only, radare2-only]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          load: true
          tags: reverse-tool:${{ matrix.target }}-test
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,scope=${{ matrix.target }},mode=max
      - name: Verify image
        run: docker run --rm reverse-tool:${{ matrix.target }}-test --version
