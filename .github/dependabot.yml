version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    groups:
      all-actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels: [dependencies, docker]
    groups:
      all-docker:
        patterns: ["*"]
