version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: [dependencies, ci]

  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: monthly
    labels: [dependencies, docker]
